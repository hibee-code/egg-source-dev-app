<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In & Register — Egg Connect</title>

  <!-- Primary Meta Tags -->
  <meta name="title" content="Sign In & Register — Egg Connect">
  <meta name="description" content="Access your Egg Connect buyer or seller account to manage poultry orders, inventory, and direct crate bookings across Nigeria.">
  <meta name="keywords" content="EggConnect login, poultry marketplace sign in, farm account register">
  <meta name="author" content="EggConnect">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://eggconnect.app/auth">

  <!-- Favicon & PWA Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo-egg-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/logo-egg-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/logo-egg-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1f4d0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Open Graph / Facebook / WhatsApp / LinkedIn / Telegram -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eggconnect.app/auth">
  <meta property="og:site_name" content="Egg Connect">
  <meta property="og:title" content="Sign In & Register — Egg Connect">
  <meta property="og:description" content="Access your Egg Connect buyer or seller account to manage poultry orders and crate bookings.">
  <meta property="og:image" content="https://eggconnect.app/assets/images/og-banner.png">
  <meta property="og:image:secure_url" content="https://eggconnect.app/assets/images/og-banner.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Egg Connect Auth Banner">

  <!-- Twitter Card Metadata -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@eggconnect_app">
  <meta name="twitter:creator" content="@eggconnect_app">
  <meta name="twitter:title" content="Sign In & Register — Egg Connect">
  <meta name="twitter:description" content="Access your Egg Connect buyer or seller account to manage poultry orders and crate bookings.">
  <meta name="twitter:image" content="https://eggconnect.app/assets/images/og-banner.png">
  <meta name="twitter:image:alt" content="Egg Connect Auth Banner">

  <!-- CSS & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body class="page-auth">
  <div id="navbar-root"></div>
  <main class="page">
    <div class="auth-layout">
      <section class="auth-visual">
        <div class="auth-overlay"></div>
        <div class="auth-visual__inner">
          <h1 class="auth-visual__title">Empowering the Future of Poultry Sourcing</h1>
          <div class="auth-badges">
            <div class="badge-pill"><span>✓</span> Verified Supply Chain</div>
            <div class="badge-pill"><span>✓</span> Real-time Market Data</div>
          </div>
        </div>
      </section>
      
      <section class="auth-panel">
        <!-- Unified Pill Toggle Switcher -->
        <div class="auth-pill-toggle">
          <button id="tab-login" class="auth-pill-tab active" type="button">Sign In</button>
          <button id="tab-register" class="auth-pill-tab" type="button">Sign Up</button>
        </div>

        <div class="auth-card">
          <!-- Logo Container -->
          <div class="auth-logo-box">
            <img src="/assets/images/logo-egg.svg" alt="Egg Connect Logo" style="width: 64px; height: 64px; object-fit: contain;">
          </div>

          <!-- Login Container Header -->
          <div id="login-header-group">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Access your Egg Connect account</p>
          </div>

          <!-- Register Container Header (Hidden by default) -->
          <div id="register-header-group" class="hidden">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Get started with your secure poultry account</p>
          </div>

          <!-- LOGIN FORM -->
          <form id="login-form" class="auth-form">
            <div class="filter-group">
              <label class="label label-pill" for="login-email">Email Address <span class="required-star">*</span></label>
              <input id="login-email" type="email" class="input-field input-pill" placeholder="Enter your email" required>
            </div>
            
            <div class="filter-group">
              <label class="label label-pill" for="login-password">Password <span class="required-star">*</span></label>
              <div class="password-field">
                <input id="login-password" type="password" class="input-field input-pill" placeholder="Enter password" required style="padding-right: 48px;">
                <button type="button" class="password-toggle toggle-password" data-target="login-password" aria-label="Toggle Password Visibility">
                  <i data-lucide="eye" style="width: 18px; height: 18px; display: block;"></i>
                </button>
              </div>
            </div>

            <div class="auth-options-row">
              <label class="checkbox-container">
                <input type="checkbox" id="login-remember">
                <span class="checkmark"></span>
                <span class="checkbox-text">Remember me</span>
              </label>
              <a href="#" class="forgot-pass-link">Forgot Password?</a>
            </div>

            <button id="login-submit" type="submit" class="btn btn-gradient" style="width:100%;">Sign In</button>
          </form>

          <!-- REGISTER FORM -->
          <form id="register-form" class="auth-form hidden">
            <div class="field-row">
              <div class="filter-group">
                <label class="label label-pill" for="register-firstname">First Name <span class="required-star">*</span></label>
                <input id="register-firstname" type="text" class="input-field input-pill" placeholder="Enter first name" required>
              </div>
              <div class="filter-group">
                <label class="label label-pill" for="register-lastname">Last Name <span class="required-star">*</span></label>
                <input id="register-lastname" type="text" class="input-field input-pill" placeholder="Enter last name" required>
              </div>
            </div>
            
            <div class="filter-group">
              <label class="label label-pill" for="register-email">Email Address <span class="required-star">*</span></label>
              <input id="register-email" type="email" class="input-field input-pill" placeholder="Enter your email" required>
            </div>
            
            <div class="filter-group">
              <label class="label label-pill" for="register-phone">Phone Number <span class="required-star">*</span></label>
              <input id="register-phone" type="tel" class="input-field input-pill" placeholder="Enter phone number" required>
            </div>
            
            <div class="filter-group hidden">
              <label class="label label-pill">Account Role <span class="required-star">*</span></label>
              <div class="auth-roles">
                <button type="button" class="role-card active" data-role="CUSTOMER">Buyer</button>
              </div>
            </div>
            <input id="register-role" type="hidden" value="CUSTOMER">
            
            <div class="filter-group">
              <label class="label label-pill" for="register-password">Password <span class="required-star">*</span></label>
              <div class="password-field">
                <input id="register-password" type="password" class="input-field input-pill" placeholder="Enter password" required style="padding-right: 48px;">
                <button type="button" class="password-toggle toggle-password" data-target="register-password" aria-label="Toggle Password Visibility">
                  <i data-lucide="eye" style="width: 18px; height: 18px; display: block;"></i>
                </button>
              </div>
            </div>
            
            <div class="filter-group">
              <label class="label label-pill" for="register-confirm">Confirm Password <span class="required-star">*</span></label>
              <div class="password-field">
                <input id="register-confirm" type="password" class="input-field input-pill" placeholder="Confirm password" required style="padding-right: 48px;">
                <button type="button" class="password-toggle toggle-password" data-target="register-confirm" aria-label="Toggle Password Visibility">
                  <i data-lucide="eye" style="width: 18px; height: 18px; display: block;"></i>
                </button>
              </div>
            </div>

            <div class="auth-options-row">
              <label class="checkbox-container">
                <input type="checkbox" id="register-terms" required>
                <span class="checkmark"></span>
                <span class="checkbox-text">I accept policies inside the <a href="#" class="policy-link">Terms of Service</a> and <a href="#" class="policy-link">Privacy Policy</a></span>
              </label>
            </div>

            <button id="register-submit" type="submit" class="btn btn-gradient" style="width:100%;">Create Account</button>
          </form>


        </div>
      </section>
    </div>
  </main>
  <script type="module" src="/components/layout/navbar.js"></script>
  <script type="module" src="/pages/auth.js"></script>
</body>
</html>
